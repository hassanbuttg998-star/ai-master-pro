<!DOCTYPE html>
<html>
<head>
    <title>AI Prompt Tool</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: Arial; padding-top: 50px; }
        input { padding: 10px; width: 250px; border-radius: 5px; }
        button { padding: 10px 20px; background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>My AI Prompt Tool</h1>
    <input id="in" type="text" placeholder="Write something...">
    <button onclick="run()">Generate</button>
    <p id="out"></p>

    <script>
        function run() {
            var val = document.getElementById('in').value;
            document.getElementById('out').innerText = val + ", ultra realistic, 8k, cinematic";
        }
    </script>
</body>
</html>

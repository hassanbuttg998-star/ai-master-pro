<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Pro - Create Masterpieces</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="text-gray-200">

    <nav class="p-6 sticky top-0 z-50 glass shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold gradient-text">AI Master Pro</h1>
            <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest">
                <a href="#tool" class="hover:text-blue-400 transition">Tool</a>
                <a href="#samples" class="hover:text-blue-400 transition">Samples</a>
                <a href="#about" class="hover:text-blue-400 transition">About Dev</a>
            </div>
        </div>
    </nav>

    <section id="tool" class="py-20 px-4 animate__animated animate__fadeIn">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-5xl md:text-6xl font-bold mb-6">Stop Writing, <br><span class="gradient-text">Start Creating.</span></h2>
            <div class="glass p-2 rounded-2xl flex flex-col md:flex-row shadow-2xl mb-12">
                <input id="userInput" type="text" placeholder="Imagine something... (e.g. Neon Samurai)" 
                    class="bg-transparent flex-1 p-5 outline-none text-white text-lg">
                <button onclick="generatePrompt()" 
                    class="bg-blue-600 hover:bg-blue-500 px-10 py-5 rounded-xl font-bold transition-all shadow-lg active:scale-95">
                    Generate ✨
                </button>
            </div>

            <div id="resultBox" class="mt-8 p-6 glass rounded-2xl hidden animate__animated animate__zoomIn border-blue-500/50 border">
                <p id="finalPrompt" class="text-xl italic text-white"></p>
                <button onclick="copyText()" class="mt-6 text-sm bg-white/10 hover:bg-white/20 py-2 px-6 rounded-full transition">
                    Copy Prompt 📋
                </button>
            </div>
        </div>
    </section>

    <section id="samples" class="py-20 bg-black/20">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-3xl font-bold mb-10 text-center">Generated with our Tool</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <div class="glass p-4 rounded-2xl transform transition hover:scale-105 duration-300">
                    <img src="https://cdn.leonardo.ai/users/746e8961-76d4-4e4c-9842-db8c9fdd77d1/generations/1f14f3f2-0d68-6660-bc4d-a28ab05e99a2/lucid-origin_Ancient_God_volumetric_liCyberpunk_Cat_surrealism_style_vivid_colors_dreamlike_a-0.jpg" 
                         class="h-64 w-full object-cover rounded-xl mb-4 shadow-lg">
                    <p class="text-sm font-semibold text-blue-400 italic text-center">"Cyberpunk Cat Style"</p>
                </div>

                <div class="glass p-4 rounded-2xl transform transition hover:scale-105 duration-300">
                    <img src="https://cdn.leonardo.ai/users/746e8961-76d4-4e4c-9842-db8c9fdd77d1/generations/1f14f3fa-7402-6990-adc6-85eaef128a74/lucid-origin_futuristic_City_with_traffic_surrealism_style_vivid_colors_dreamlike_atmosphere_-0.jpg" 
                         class="h-64 w-full object-cover rounded-xl mb-4 shadow-lg">
                    <p class="text-sm font-semibold text-emerald-400 italic text-center">"Futuristic Cityscape"</p>
                </div>

                <div class="glass p-4 rounded-2xl transform transition hover:scale-105 duration-300">
                    <img src="https://cdn.leonardo.ai/users/746e8961-76d4-4e4c-9842-db8c9fdd77d1/generations/1f14f41e-75df-68c0-970b-c1474825050b/lucid-origin_Astronaut_in_space_cinematic_lighting_8k_highly_detailed_unreal_engine_5_masterp-0.jpg" 
                         class="h-64 w-full object-cover rounded-xl mb-4 shadow-lg">
                    <p class="text-sm font-semibold text-orange-400 italic text-center">"Astronaut in Space"</p>
                </div>

            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-white/5 text-gray-500 text-xs">
        &copy; 2026 AI Master Pro Tool
    </footer>

    <script>
        function generatePrompt() {
            const input = document.getElementById('userInput').value;
            const resultBox = document.getElementById('resultBox');
            const finalPrompt = document.getElementById('finalPrompt');
            if(!input) return;
            const mod = "cinematic lighting, 8k, highly detailed, unreal engine 5, masterpiece, sharp focus";
            finalPrompt.innerText = input + ", " + mod;
            resultBox.classList.remove('hidden');
        }
        function copyText() {
            navigator.clipboard.writeText(document.getElementById('finalPrompt').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
